<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LCARS Shabbos Countdown</title>

<style>
    body {
        margin: 0;
        background: #000;
        font-family: "Segoe UI", sans-serif;
        color: #fff;
        overflow: hidden;
    }

    /* LCARS Colors */
    :root {
        --lcars-orange: #ff9966;
        --lcars-blue: #6699ff;
        --lcars-pink: #ff6699;
        --lcars-gold: #ffcc66;
        --lcars-bg: #000000;
    }

    /* Left LCARS Pillar */
    .lcars-left {
        position: fixed;
        left: 0;
        top: 0;
        width: 180px;
        height: 100%;
        background: var(--lcars-orange);
        border-top-right-radius: 90px;
        border-bottom-right-radius: 90px;
        padding-top: 40px;
    }

    /* LCARS segmented bars */
    .segment {
        height: 60px;
        margin: 20px 0;
        border-top-right-radius: 30px;
        border-bottom-right-radius: 30px;
    }

    .pink { background: var(--lcars-pink); }
    .blue { background: var(--lcars-blue); }
    .gold { background: var(--lcars-gold); }

    /* Main content */
    .content {
        margin-left: 220px;
        padding: 40px;
        color: var(--lcars-gold);
        font-size: 32px;
        text-align: center;
    }

    #time {
        margin-top: 40px;
        font-size: 60px;
        color: var(--lcars-blue);
    }

    h1 {
        font-size: 48px;
        color: var(--lcars-pink);
        margin-bottom: 10px;
    }
</style>
</head>

<body>

<!-- LCARS Left Rail -->
<div class="lcars-left">
    <div class="segment pink"></div>
    <div class="segment blue"></div>
    <div class="segment gold"></div>
    <div class="segment pink"></div>
</div>

<!-- Main Display -->
<div class="content">
    <h1>SHABBOS COUNTDOWN</h1>
    <div id="time">Loading…</div>
</div>

<script>
async function updateCountdown() {
    const now = new Date();

    // Hebcal API for Teaneck (geonameid 5105262)
    const url = "https://www.hebcal.com/shabbat?cfg=json&geonameid=5105262&m=50";

    const response = await fetch(url);
    const data = await response.json();

    // Find candle-lighting event
    const candleEvent = data.items.find(item => item.category === "candles");

    // Candle-lighting time
    const candle = new Date(candleEvent.date);

    // Time difference
    const diffMs = candle - now;

    if (diffMs <= 0) {
        document.getElementById("time").innerText = "SHABBOS IS NOW";
        return;
    }

    const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
    const diffMinutes = Math.floor((diffMs / (1000 * 60)) % 60);

    document.getElementById("time").innerText =
        `${diffHours} HOURS  ${diffMinutes} MINUTES`;
}

// Update every second
setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
